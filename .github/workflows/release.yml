name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag versi (tanpa v, misal: 0.1.9) — wajib diisi jika bukan push tag"
        required: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cargo build --release
        working-directory: windows-worker
      - run: |
          New-Item -ItemType Directory -Force windows-app/src-tauri/binaries
          # ponytail: Tauri v2 sidecar wajib pakai target triple di nama file
          Copy-Item windows-worker/target/release/firefiles-worker.exe windows-app/src-tauri/binaries/firefiles-worker-x86_64-pc-windows-msvc.exe
      - run: npm install
        working-directory: windows-app
      - run: npm run build
        working-directory: windows-app
      - uses: actions/upload-artifact@v4
        with:
          name: firefiles-msi
          path: windows-app/src-tauri/target/release/bundle/msi/*.msi

  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: firefiles-apk
          path: android-app/app/build/outputs/apk/debug/*.apk

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
        working-directory: windows-worker
      - run: |
          # ponytail: workflow_dispatch tanpa tag → GITHUB_REF_NAME kosong, pakai input
          PKG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER="${PKG_VER:-${{ github.event.inputs.version }}}"
          [[ -n "$PKG_VER" ]] || { echo "ERROR: versi tidak diketahui"; exit 1; }
          mkdir -p pkg/usr/bin pkg/usr/share/firefiles
          cp windows-worker/target/release/firefiles-worker pkg/usr/bin/
          cp ubuntu/*.sh pkg/usr/share/firefiles/
          sudo gem install fpm
          fpm -s dir -t deb -n firefiles-worker -v "$PKG_VER" -C pkg usr
      - uses: actions/upload-artifact@v4
        with:
          name: firefiles-deb
          path: "*.deb"

  rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
        working-directory: windows-worker
      - run: |
          # ponytail: sama seperti deb — aman untuk workflow_dispatch
          PKG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER="${PKG_VER:-${{ github.event.inputs.version }}}"
          [[ -n "$PKG_VER" ]] || { echo "ERROR: versi tidak diketahui"; exit 1; }
          mkdir -p pkg/usr/bin pkg/usr/share/firefiles
          cp windows-worker/target/release/firefiles-worker pkg/usr/bin/
          cp ubuntu/*.sh pkg/usr/share/firefiles/
          sudo gem install fpm
          fpm -s dir -t rpm -n firefiles-worker -v "$PKG_VER" -C pkg usr
      - uses: actions/upload-artifact@v4
        with:
          name: firefiles-rpm
          path: "*.rpm"

  github-release:
    needs: [msi, apk, deb, rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
