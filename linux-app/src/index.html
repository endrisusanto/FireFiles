<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FireFiles Setup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #f97316;
      --accent-dim: rgba(249,115,22,.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-ring {
      width: 40px; height: 40px;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    main {
      flex: 1;
      padding: 28px;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    label { font-size: 13px; color: var(--muted); }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .row { display: flex; gap: 8px; align-items: flex-end; }
    .row input { flex: 1; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    button:hover { opacity: .88; }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    .btn-full { width: 100%; margin-top: 4px; }

    #status {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(249,115,22,.3);
      color: var(--accent);
      display: none;
      line-height: 1.5;
    }
    #status.ok  { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.3); color: var(--green); }
    #status.err { background: rgba(239,68,68,.1);  border-color: rgba(239,68,68,.3);  color: var(--red); }
    #status.show { display: block; }

    .pass-row { display: flex; gap: 8px; align-items: flex-end; }
    .pass-row input { flex: 1; font-family: monospace; letter-spacing: .05em; }
  </style>
</head>
<body>

<header>
  <div class="logo-ring">🔥</div>
  <div>
    <h1>FireFiles Setup</h1>
    <p>Ubuntu receiver — auto Samba + register</p>
  </div>
</header>

<main>

  <!-- Server config -->
  <div class="card">
    <div class="card-title">Monitor Server</div>
    <div class="field">
      <label>Server URL</label>
      <input id="serverUrl" type="url" placeholder="https://files.endrisusanto.my.id" value="https://files.endrisusanto.my.id">
    </div>
    <div class="field">
      <label>Token</label>
      <input id="token" type="text" placeholder="change-me">
    </div>
  </div>

  <!-- Samba config -->
  <div class="card">
    <div class="card-title">Samba Share</div>
    <div class="field">
      <label>Inbox folder (firmware akan masuk ke sini)</label>
      <input id="shareDir" type="text" placeholder="/home/firmware/inbox">
    </div>
    <div class="field">
      <label>Share name</label>
      <input id="shareName" type="text" value="FirmwareInbox">
    </div>
    <div class="field">
      <label>SMB username</label>
      <input id="smbUser" type="text" value="firmware">
    </div>
    <div class="field">
      <label>SMB password</label>
      <div class="pass-row">
        <input id="smbPass" type="text" placeholder="auto-generated">
        <button class="secondary" id="genPass">↻ Generate</button>
      </div>
    </div>
  </div>

  <!-- Detected IP -->
  <div class="card">
    <div class="card-title">Host Info</div>
    <div class="field">
      <label>LAN IP (akan diregister ke server)</label>
      <input id="hostIp" type="text" readonly placeholder="mendeteksi...">
    </div>
  </div>

  <div id="status"></div>

  <button class="btn-full" id="setupBtn">⚡ Auto Setup Samba + Register ke Server</button>

</main>

<script type="module">
  import { invoke } from '@tauri-apps/api/core';

  const $ = id => document.getElementById(id);

  async function init() {
    try {
      const ip = await invoke('detect_ip');
      $('hostIp').value = ip;
    } catch (e) {
      $('hostIp').value = 'tidak terdeteksi';
    }
    try {
      const pass = await invoke('generate_password');
      $('smbPass').value = pass;
    } catch (_) {}
  }

  $('genPass').onclick = async () => {
    $('smbPass').value = await invoke('generate_password');
  };

  function setStatus(msg, type = '') {
    const el = $('status');
    el.textContent = msg;
    el.className = 'show ' + type;
  }

  $('setupBtn').onclick = async () => {
    const shareDir  = $('shareDir').value.trim();
    const shareName = $('shareName').value.trim();
    const smbUser   = $('smbUser').value.trim();
    const smbPass   = $('smbPass').value.trim();
    const serverUrl = $('serverUrl').value.trim();
    const token     = $('token').value.trim();
    const host      = $('hostIp').value.trim();

    if (!shareDir) return setStatus('Isi folder inbox dulu.', 'err');
    if (!host || host === 'tidak terdeteksi') return setStatus('LAN IP tidak terdeteksi.', 'err');

    $('setupBtn').disabled = true;
    setStatus('Menjalankan setup Samba… (akan muncul dialog password)');

    try {
      const msg = await invoke('setup_samba', { shareDir, shareName, user: smbUser, pass: smbPass });
      setStatus(`✓ ${msg} — mendaftarkan ke server…`);
    } catch (e) {
      $('setupBtn').disabled = false;
      return setStatus(`Setup gagal: ${e}`, 'err');
    }

    try {
      await invoke('register_config', {
        url: serverUrl, token,
        host, share: shareName, user: smbUser, pass: smbPass, folder: ''
      });
      setStatus(`✅ Selesai! Config terdaftar di server.\nAndroid & Windows tinggal klik "Fetch from Server".`, 'ok');
    } catch (e) {
      setStatus(`Samba OK, tapi register gagal: ${e}`, 'err');
    }

    $('setupBtn').disabled = false;
  };

  init();
</script>

</body>
</html>
